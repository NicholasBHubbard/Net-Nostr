name: run-tests

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 't/**'
      - 'cpanfile'
      - 'Makefile.PL'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lib/**'
      - 't/**'
      - 'cpanfile'
      - 'Makefile.PL'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        perl: ['5.16', 'latest']
    name: Perl ${{ matrix.perl }}
    env:
      PERL5LIB: /home/runner/perl5/lib/perl5
      PERL_LOCAL_LIB_ROOT: /home/runner/perl5
      PERL_MB_OPT: --install_base /home/runner/perl5
      PERL_MM_OPT: INSTALL_BASE=/home/runner/perl5
    steps:
      - uses: actions/checkout@v4

      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - uses: actions/cache@v4
        with:
          path: ~/perl5
          key: perl-${{ matrix.perl }}-${{ hashFiles('cpanfile', '.github/workflows/test.yml') }}

      - name: Install dependencies
        run: cpanm --local-lib ~/perl5 --installdeps .

      - name: Build
        run: perl Makefile.PL && make

      - name: Test
        run: prove -r -l -v t/
