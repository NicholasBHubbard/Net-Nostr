name: run-tests

on:
  push:
    branches: [main]
    paths:
      - 'dist/**'
      - 't/**'
      - 'Changes'
      - 'README.md'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dist/**'
      - 't/**'
      - 'Changes'
      - 'README.md'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        perl: ['5.16', 'latest']
    name: Perl ${{ matrix.perl }}
    env:
      PERL5LIB: /home/runner/perl5/lib/perl5
      PERL_LOCAL_LIB_ROOT: /home/runner/perl5
      PERL_MB_OPT: --install_base /home/runner/perl5
      PERL_MM_OPT: INSTALL_BASE=/home/runner/perl5
    steps:
      - uses: actions/checkout@v4

      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - uses: actions/cache@v4
        with:
          path: ~/perl5
          key: perl-${{ matrix.perl }}-${{ hashFiles('dist/*/Makefile.PL', '.github/workflows/test.yml') }}

      - name: Install author test dependencies
        run: cpanm --local-lib ~/perl5 Test::Pod Test::Pod::Coverage

      - name: Build and test Core
        run: |
          cpanm --local-lib ~/perl5 --installdeps ./dist/Net-Nostr-Core
          cd dist/Net-Nostr-Core
          perl Makefile.PL
          make
          make test
          make install

      - name: Build and test Client
        run: |
          cpanm --local-lib ~/perl5 --installdeps ./dist/Net-Nostr-Client
          cd dist/Net-Nostr-Client
          perl Makefile.PL
          make
          make test
          make install

      - name: Build and test Relay
        run: |
          cpanm --local-lib ~/perl5 --installdeps ./dist/Net-Nostr-Relay
          cd dist/Net-Nostr-Relay
          perl Makefile.PL
          make
          make test
          make install

      - name: Build and test shim
        run: |
          cpanm --local-lib ~/perl5 --installdeps ./dist/Net-Nostr
          cd dist/Net-Nostr
          perl Makefile.PL
          make
          make test
          make install

      - name: Author layout checks
        run: prove -v t/author/*.t
